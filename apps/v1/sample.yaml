
deployment:
  resources:
    cpu: "4"
    memory: "16Gi"
    gpu:
      count: 1
      type: "nvidia.com/gpu"
      memory: "16GB"
      product: ["A100", "RTX4090"]
    storage: "50Gi"
  replicas: 1
  port: 8080
  protocol: http
  environment:
    MAX_INPUT_LENGTH: "4096"
    MAX_TOTAL_TOKENS: "4096"

logo: logo.png
config_file: config/deployment.yaml
schema_file: config/schema.yaml

license: Custom (Llama 2)
papers:
  - title: "Llama 2: Open Foundation and Fine-Tuned Chat Models"
    url: "https://arxiv.org/abs/2307.09288"
    arxiv_id: "2307.09288"
